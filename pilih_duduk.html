<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Kursi | Rajendra Tours</title>
    <!-- Link Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link CSS -->
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/pilihduduk.css">
    <link rel="icon" href="assets/img/Desain tanpa judul (1).png" type="image/png">
</head>
<body>
    <div class="navbar">
        <img src="assets/img/Desain tanpa judul (1).png" alt="Logo">
    </div>

    <div class="container">
        <div class="content-card">
            <h2>Pilih Posisi Duduk</h2>
            <div class="seat-grid-container">
                <div class="seat-grid">
                    <div class="seat" data-seat="1">1</div>
                    <div class="seat unavailable" data-seat="X">X</div>
                    <div class="seat driver">👤</div>
                    <div class="seat" data-seat="2">2</div>
                    <div class="seat unavailable" data-seat="X">X</div>
                    <div class="seat" data-seat="3">3</div>
                    <div class="seat" data-seat="4">4</div>
                    <div class="seat unavailable" data-seat="X">X</div>
                    <div class="seat" data-seat="5">5</div>
                </div>
            </div>
            
            <div class="summary mt-10">
                <div class="summary-item">
                    <span>Kursi Dipilih:</span>
                    <span id="selectedSeats" class="badge">-</span>
                </div>
                <div class="summary-item">
                    <span>Total Harga:</span>
                    <span class="price-text">Rp.<span id="totalPrice">0</span></span>
                </div>
                <button id="confirmButton" class="btn btn-primary mt-10">Konfirmasi Pesanan</button>
            </div>
        </div>
    </div>

    <div class="bottom-navbar">
        <a href="index.html" id="nav-home">
          <span>🏠</span>
          <p>Beranda</p>
        </a>
        <a href="jadwal.html" id="nav-schedule">
          <span>🕒</span>
          <p>Jadwal</p>
        </a>
        <a href="profile.html" id="nav-profile">
          <span>👤</span>
          <p>Profil</p>
        </a>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
