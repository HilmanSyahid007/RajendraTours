<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rajendra Tours</title>
    <!-- Link Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link CSS -->
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="navbar">
        <img src="assets/img/Desain tanpa judul (1).png" alt="Logo">
    </div>

    <div class="container">
        <div class="content-card">
            <h1>Masuk Akun</h1>
            <p class="text-center mb-20" style="color: var(--text-light); font-size: 0.9rem;">Masuk menggunakan nomor WhatsApp Anda</p>
            
            <div class="form-group">
                <input type="tel" id="phoneInput" placeholder="Masukkan No. WhatsApp (Contoh: 0812...)">
                <button onclick="kirimOTP()" class="btn btn-primary mt-10">Kirim Kode OTP</button>
            </div>

            <div id="otpSection" class="hidden mt-10">
                <div class="form-group">
                    <input type="text" id="otpInput" placeholder="Masukkan 6 Digit Kode OTP">
                    <button onclick="verifikasiOTP()" class="btn btn-primary mt-10">Verifikasi & Masuk</button>
                </div>
            </div>

            <div class="text-center mt-20">
                <a href="index.html" style="text-decoration: none; color: var(--primary-color); font-weight: 500;">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <div class="bottom-navbar">
        <a href="index.html" id="nav-home">
          <span>🏠</span>
          <p>Beranda</p>
        </a>
        <a href="jadwal.html" id="nav-schedule">
          <span>🕒</span>
          <p>Jadwal</p>
        </a>
        <a href="profile.html" id="nav-profile">
          <span>👤</span>
          <p>Profil</p>
        </a>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        // Inline overrides for login specific behavior if needed
        function kirimOTP() {
            const phone = document.getElementById("phoneInput").value.trim();
            if (phone === "") {
                alert("Harap masukkan nomor WhatsApp");
                return;
            }
            const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            alert("Simulasi: Kode OTP Anda adalah " + otpCode);
            sessionStorage.setItem("temp_otp", otpCode);
            sessionStorage.setItem("temp_phone", phone);
            document.getElementById("otpSection").classList.remove("hidden");
        }

        function verifikasiOTP() {
            const inputCode = document.getElementById("otpInput").value.trim();
            const correctCode = sessionStorage.getItem("temp_otp");
            const phone = sessionStorage.getItem("temp_phone");

            if (inputCode === correctCode) {
                localStorage.setItem("loggedInUser", phone);
                alert("Berhasil login!");
                window.location.href = "profile.html";
            } else {
                alert("Kode OTP salah!");
            }
        }
    </script>
</body>
</html>
